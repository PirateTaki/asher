<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Then Asher Said…</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #fdf6ee;
    --warm: #f5e6d0;
    --ink: #2a1f14;
    --soft: #8a7060;
    --accent: #c4724a;
    --olive: #4a5e2a;
    --olive-light: #6b7f45;
    --olive-pale: #eef2e6;
    --card-bg: #fffdf9;
    --shadow: rgba(42,31,20,0.10);
  }
  body {
    background-color: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 10%, #f0e0cc55 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, #e8d5bc44 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    padding: 0 0 80px 0;
  }
  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--olive-light);
    margin: 18px auto 0;
    border-radius: 2px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  h1 em {
    font-style: italic;
    color: var(--olive);
  }
  .subtitle {
    font-size: 0.85rem;
    color: var(--soft);
    margin-top: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 300;
  }
  /* SEARCH */
  .search-section {
    max-width: 560px;
    margin: 28px auto 0;
    padding: 0 20px;
  }
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    border: 1.5px solid #ddd4c8;
    background: var(--card-bg);
    border-radius: 10px;
    padding: 11px 40px 11px 16px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus {
    border-color: var(--olive-light);
  }
  .search-input::placeholder { color: #c9b89e; }
  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #c9b89e;
    font-size: 1rem;
    pointer-events: none;
  }
  .search-count {
    font-size: 0.75rem;
    color: var(--soft);
    text-align: right;
    margin-top: 6px;
    letter-spacing: 0.04em;
    min-height: 18px;
  }
  /* CONFIG BANNER */
  .config-banner {
    max-width: 560px;
    margin: 0 auto 24px;
    padding: 0 20px;
  }
  .config-inner {
    background: #fff3ec;
    border: 1.5px dashed var(--accent);
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 0.85rem;
    color: var(--ink);
    line-height: 1.6;
  }
  .config-inner strong { color: var(--accent); }
  .config-inner code {
    background: #f5e0d4;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.8rem;
    font-family: monospace;
  }
  /* ADD FORM */
  .add-section {
    max-width: 560px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }
  .add-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 16px var(--shadow);
    border: 1px solid #ede4d8;
  }
  .add-card label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 8px;
    font-weight: 400;
  }
  .quote-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 64px;
    line-height: 1.6;
    border-bottom: 1.5px solid #e0d4c4;
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .quote-input::placeholder { color: #c9b89e; }
  .context-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--soft);
    resize: none;
    outline: none;
    min-height: 40px;
    line-height: 1.6;
    border-bottom: 1.5px solid #e0d4c4;
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .context-input::placeholder { color: #c9b89e; }
  .name-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--soft);
    outline: none;
    border-bottom: 1.5px solid #e0d4c4;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .name-input::placeholder { color: #c9b89e; }
  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 28px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    float: right;
  }
  .add-btn:hover { background: #b5613b; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled { background: #d4b8a8; cursor: not-allowed; }
  .clearfix::after { content: ''; display: table; clear: both; }
  /* STATUS */
  .status {
    font-size: 0.8rem;
    color: var(--soft);
    margin-top: 10px;
    min-height: 20px;
    text-align: center;
  }
  .status.error { color: #c04a2a; }
  .status.success { color: #5a8a5a; }
  /* ENTRIES */
  .entries {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--soft);
  }
  .empty-state .big {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    margin-bottom: 8px;
    color: #c9b89e;
  }
  .empty-state .small {
    font-size: 0.82rem;
    letter-spacing: 0.05em;
  }
  .entry {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 20px 22px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid #ede4d8;
    position: relative;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-quote {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 10px;
    padding-left: 18px;
    border-left: 3px solid var(--olive-light);
  }
  .entry-context {
    font-size: 0.83rem;
    color: var(--soft);
    line-height: 1.5;
    margin-bottom: 12px;
    padding-left: 18px;
  }
  .entry-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .entry-date {
    font-size: 0.72rem;
    color: #b5a090;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .entry-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .entry-age {
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .entry-by {
    font-size: 0.72rem;
    color: #b5a090;
    letter-spacing: 0.04em;
    font-style: italic;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #cbbdad;
    font-size: 1rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
    position: absolute;
    top: 14px;
    right: 14px;
  }
  .delete-btn:hover { color: var(--accent); }
  /* EXPORT */
  .export-bar {
    max-width: 560px;
    margin: 32px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: flex-end;
  }
  .export-btn {
    background: none;
    border: 1.5px solid #d4c4b0;
    color: var(--soft);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: all 0.2s;
  }
  .export-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--soft);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
  }
</style>
</head>
<body>
<header>
  <h1>Then Asher <em>Said…</em></h1>
  <div class="subtitle">A record of the things that stop you in your tracks</div>
</header>
<div class="search-section">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search quotes or context…" oninput="filterEntries()">
    <span class="search-icon">🔍</span>
  </div>
  <div class="search-count" id="searchCount"></div>
</div>
<!-- This banner only shows if keys aren't set -->
<div class="config-banner" id="configBanner" style="display:none">
  <div class="config-inner">
    <strong>⚙️ One-time setup needed:</strong> Open this file in a text editor and replace<br>
    <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code><br>
    with your actual Supabase project values. See the setup instructions! 🙂
  </div>
</div>
<div class="add-section">
  <div class="add-card">
    <label>What did he say?</label>
    <textarea class="quote-input" id="quoteInput" placeholder="&ldquo;I dun like dat!&rdquo;" rows="2"></textarea>
    <label>What was happening?</label>
    <textarea class="context-input" id="contextInput" placeholder="We were brushing out major knots and he stopped, turned around, looked me dead in the eyes…" rows="2"></textarea>
    <label>Added by</label>
    <input class="name-input" id="nameInput" placeholder="Mama, Grandma, Auntie…" type="text">
    <div class="clearfix">
      <button class="add-btn" id="addBtn" onclick="addEntry()">Save ✦</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<div class="export-bar" id="exportBar" style="display:none">
  <button class="export-btn" onclick="exportEntries()">Export as text</button>
</div>
<div class="entries" id="entriesList">
  <div class="loading">Loading entries…</div>
</div>
<script>
  // ============================================================
  // 🔧 REPLACE THESE TWO VALUES WITH YOUR SUPABASE CREDENTIALS
  // ============================================================
  const SUPABASE_URL = 'https://argnetoaovcodatvgqvh.supabase.co’;
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyZ25ldG9hb3Zjb2RhdHZncXZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDIyMDIsImV4cCI6MjA5MzkxODIwMn0.z2PVIFUUy07Bt2Ciw8NFS47_xBg7dqwsUnZHcOGr_ss’;
  // ============================================================
  const BIRTH_DATE = new Date('2024-10-30');
  const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
  let client = null;
  let allEntries = [];
  if (isConfigured) {
    client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    document.getElementById('configBanner').style.display = 'block';
    document.getElementById('entriesList').innerHTML = `
      <div class="empty-state">
        <div class="big">"…"</div>
        <div class="small">Finish setup to see entries here.</div>
      </div>`;
  }
  function getAge(dateStr) {
    const then = new Date(dateStr);
    const diff = then - BIRTH_DATE;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const months = Math.floor(days / 30.44);
    const weeks = Math.floor((days % 30.44) / 7);
    if (months < 1) return `${days}d old`;
    if (weeks === 0) return `${months}mo old`;
    return `${months}mo ${weeks}w old`;
  }
  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });
  }
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function setStatus(msg, type='') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }
  function filterEntries() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) {
      render(allEntries);
      document.getElementById('searchCount').textContent = '';
      return;
    }
    const filtered = allEntries.filter(e =>
      e.quote.toLowerCase().includes(q) ||
      (e.context && e.context.toLowerCase().includes(q)) ||
      (e.added_by && e.added_by.toLowerCase().includes(q))
    );
    render(filtered);
    const n = filtered.length;
    document.getElementById('searchCount').textContent =
      n === 0 ? 'No matches' : `${n} ${n === 1 ? 'entry' : 'entries'} found`;
  }
  async function loadEntries() {
    if (!isConfigured) return;
    const { data, error } = await client
      .from('asher_quotes')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      document.getElementById('entriesList').innerHTML =
        `<div class="empty-state"><div class="small" style="color:#c04a2a">Could not load entries. Check your Supabase setup.</div></div>`;
      return;
    }
    allEntries = data || [];
    render(allEntries);
  }
  function render(entries) {
    const list = document.getElementById('entriesList');
    const exportBar = document.getElementById('exportBar');
    if (!entries || entries.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="big">"…"</div>
          <div class="small">His first entry is waiting.</div>
        </div>`;
      exportBar.style.display = 'none';
      return;
    }
    exportBar.style.display = 'flex';
    list.innerHTML = entries.map(e => `
      <div class="entry" id="entry-${e.id}">
        <button class="delete-btn" onclick="deleteEntry('${e.id}')" title="Delete">×</button>
        <div class="entry-quote">${escHtml(e.quote)}</div>
        ${e.context ? `<div class="entry-context">${escHtml(e.context)}</div>` : ''}
        <div class="entry-meta">
          <span class="entry-date">${formatDate(e.created_at)}</span>
          <div class="entry-right">
            ${e.added_by ? `<span class="entry-by">— ${escHtml(e.added_by)}</span>` : ''}
            <span class="entry-age">${getAge(e.created_at)}</span>
          </div>
        </div>
      </div>`).join('');
  }
  async function addEntry() {
    if (!isConfigured) return;
    const quote = document.getElementById('quoteInput').value.trim();
    const context = document.getElementById('contextInput').value.trim();
    const added_by = document.getElementById('nameInput').value.trim();
    if (!quote) {
      document.getElementById('quoteInput').focus();
      setStatus('Write what he said first!', 'error');
      return;
    }
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    setStatus('Saving…');
    const { data, error } = await client
      .from('asher_quotes')
      .insert([{ quote, context: context || null, added_by: added_by || null }])
      .select();
    if (error) {
      setStatus('Something went wrong. Try again.', 'error');
      btn.disabled = false;
      return;
    }
    document.getElementById('quoteInput').value = '';
    document.getElementById('contextInput').value = '';
    setStatus('Saved! ✦', 'success');
    btn.disabled = false;
    // Prepend to top
    allEntries = [data[0], ...allEntries];
    render(allEntries);
    setTimeout(() => setStatus(''), 3000);
  }
  async function deleteEntry(id) {
    if (!confirm('Remove this entry?')) return;
    const { error } = await client.from('asher_quotes').delete().eq('id', id);
    if (error) { alert('Could not delete. Try again.'); return; }
    allEntries = allEntries.filter(e => e.id !== id);
    render(allEntries);
  }
  function exportEntries() {
    const lines = allEntries.slice().reverse().map(e => {
      const by = e.added_by ? ` · added by ${e.added_by}` : '';
      return `[${formatDate(e.created_at)} · ${getAge(e.created_at)}${by}]\n"${e.quote}"${e.context ? '\n' + e.context : ''}`;
    }).join('\n\n---\n\n');
    const full = `THEN ASHER SAID…\n${'='.repeat(40)}\n\n${lines}`;
    const blob = new Blob([full], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'then-asher-said.txt';
    a.click();
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && document.activeElement.id === 'quoteInput') {
      e.preventDefault();
      document.getElementById('contextInput').focus();
    }
  });
  if (isConfigured) loadEntries();
</script>
</body>
</html>
